name: Notify owners by email on push

on:
  push:
    branches:
      - main
      - saleh

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout files
        uses: actions/checkout@v4

      - name: Read update message
        id: update_message
        shell: bash
        run: |
          if [ -f update-message.txt ]; then
            echo "message<<YAMANI_MESSAGE_END" >> $GITHUB_OUTPUT
            cat update-message.txt >> $GITHUB_OUTPUT
  echo "" >> $GITHUB_OUTPUT
  echo "YAMANI_MESSAGE_END" >> $GITHUB_OUTPUT
          else
            echo "message=Aucun message detaille fourni." >> $GITHUB_OUTPUT
          fi

      - name: Send email notification
        if: contains(github.event.head_commit.message, '[notify]')
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: Saleh738297@gmail.com
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Correction importante - Yamani Food"
          to: "aaalkhulagi@gmail.com,a774264429@gmail.com"
          from: "Yamani Food Updates <Saleh738297@gmail.com>"
          body: |
            Bonjour,

            Une correction importante a ete appliquee sur le site Yamani Food.

            Titre :
            ${{ github.event.head_commit.message }}

            Details :
            ${{ steps.update_message.outputs.message }}

            Projet : Yamani Food
            Branche : ${{ github.ref_name }}
            Developpeur : ${{ github.actor }}

            Merci pour votre confiance.

            Yamani Food


