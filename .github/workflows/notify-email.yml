name: Notify owners by email on push

on:
  push:
    branches:
      - main
      - saleh

jobs:
  send-email:
    if: contains(github.event.head_commit.message, '[notify]')
    runs-on: ubuntu-latest

    steps:
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: Saleh738297@gmail.com
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🚀 Nouvelle mise a jour - Yamani Food"
          to: "aaalkhulagi@gmail.com,a774264429@gmail.com"
          from: "Yamani Food Updates <Saleh738297@gmail.com>"
          body: |
            Bonjour 👋

            🚀 Une nouvelle mise a jour importante a ete appliquee sur le site Yamani Food.

            📌 Travail realise :
            ${{ github.event.head_commit.message }}

            📊 Informations du projet :
            • Projet : Yamani Food
            • Branche : ${{ github.ref_name }}
            • Developpeur : ${{ github.actor }}

            🎯 Objectif :
            Le site continue d’evoluer avec des ameliorations, corrections et optimisations regulieres afin d’ameliorer l’experience client, la stabilite et les performances.

            🔔 Notification envoyee uniquement pour les mises a jour importantes.

            Merci pour votre confiance 🙏

            — Yamani Food
