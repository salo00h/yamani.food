name: Notify owners by email on push

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  send-email:
    name: Notify owners by email
    runs-on: ubuntu-latest

    steps:
      - name: Check notify keyword
        id: check
        shell: bash
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          python3 <<'PY'
          import os

          found = "[notify]" in os.environ.get("COMMIT_MESSAGE", "")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"send_email={'true' if found else 'false'}\n")

          print("send_email =", found)
          PY

      - name: Stop safely if no notify
        if: steps.check.outputs.send_email != 'true'
        run: echo "No [notify] found."

      - name: Checkout repository
        if: steps.check.outputs.send_email == 'true'
        uses: actions/checkout@v4

      - name: Build UTF-8 email body
        if: steps.check.outputs.send_email == 'true'
        shell: bash
        run: |
          {
            echo "🍽️ Yamani Food — Internal Website Update"
            echo ""
            echo "Bonjour 👋 | مرحبًا 👋"
            echo ""
            echo "Une nouvelle mise à jour a été appliquée avec succès sur le site Yamani Food."
            echo "تم تطبيق تحديث جديد بنجاح على موقع Yamani Food."
            echo ""
            echo "━━━━━━━━━━━━━━━━━━"
            echo ""

            if [ -f update-message.txt ]; then
              cat update-message.txt
            else
              echo "Aucun détail supplémentaire fourni."
              echo ""
              echo "لم يتم توفير تفاصيل إضافية."
            fi

            echo ""
            echo "━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "👨‍💻 Développeur principal | المطور الرئيسي"
            echo "Saleh BA-ZIGHIFAN"
            echo ""
            echo "📌 Commit GitHub"
            echo "${{ github.event.head_commit.message }}"
            echo ""
            echo "🕒 Notification automatique envoyée depuis GitHub Actions"
            echo "تم إرسال هذه الرسالة تلقائيًا عبر GitHub Actions"
            echo ""
            echo "🚀 Yamani Food"
          } > email-body.txt

      - name: Send email
        if: steps.check.outputs.send_email == 'true'
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false

          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}

          subject: 🍽️ Yamani Food — Internal Update

          to: aaalkhulagi@gmail.com,a774264429@gmail.com

          from: ${{ secrets.EMAIL_USERNAME }}

          body: file://email-body.txt

          priority: normal