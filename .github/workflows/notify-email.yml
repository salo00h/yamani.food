name: Notify owners by email on push

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  send-email:
    name: Notify owners by email
    runs-on: ubuntu-latest

    steps:
      - name: Check notify keyword
        id: check
        shell: bash
        env:
          COMMITS_JSON: ${{ toJson(github.event.commits) }}
        run: |
          python3 <<'PY'
          import json, os

          commits = json.loads(os.environ.get("COMMITS_JSON", "[]"))
          found = any("[notify]" in commit.get("message", "") for commit in commits)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"send_email={'true' if found else 'false'}\n")

          print("send_email =", found)
          PY

      - name: Skip email
        if: steps.check.outputs.send_email != 'true'
        run: echo "No [notify] found. Email skipped."

      - name: Checkout repository
        if: steps.check.outputs.send_email == 'true'
        uses: actions/checkout@v4

      - name: Build UTF-8 email body
        if: steps.check.outputs.send_email == 'true'
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import os

          file = Path("update-message.txt")

          if file.exists():
              update_message = file.read_text(encoding="utf-8-sig").strip()
          else:
              update_message = "Aucun message fourni.\n\nلم يتم توفير تفاصيل."

          body = f"""Bonjour,

Une mise à jour importante a été appliquée sur le site Yamani Food.

Détails :
{update_message}

---

مرحبًا،

تم تطبيق تحديث مهم على موقع Yamani Food.

التفاصيل:
{update_message}
"""

          Path("email-body.txt").write_text(body, encoding="utf-8")
          PY

      - name: Send email
        if: steps.check.outputs.send_email == 'true'
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Correction importante - Yamani Food
          to: aaalkhulagi@gmail.com,a774264429@gmail.com
          from: Yamani Food Updates <${{ secrets.EMAIL_USERNAME }}>
          body: file://email-body.txt
          priority: normal