name: Notify owners by email on push

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  send-email:
    name: Notify owners by email
    runs-on: ubuntu-latest

    steps:
      - name: Check notify keyword
        id: notify
        shell: bash
        env:
          COMMITS_JSON: ${{ toJson(github.event.commits) }}
        run: |
          python3 <<'PY'
          import json, os
          commits = json.loads(os.environ["COMMITS_JSON"])
          should_notify = any("[notify]" in c.get("message", "") for c in commits)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"send={'true' if should_notify else 'false'}\n")

          print("Notify:", should_notify)
          PY

      - name: Stop if no notify keyword
        if: steps.notify.outputs.send != 'true'
        run: |
          echo "No [notify] found in commit message. Email skipped safely."

      - name: Checkout repository
        if: steps.notify.outputs.send == 'true'
        uses: actions/checkout@v4

      - name: Build UTF-8 email body
        if: steps.notify.outputs.send == 'true'
        shell: bash
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python3 <<'PY'
          from pathlib import Path
          import os

          msg_file = Path("update-message.txt")

          if msg_file.exists():
              update_message = msg_file.read_text(encoding="utf-8-sig")
          else:
              update_message = "Aucun message fourni.\n\nلم يتم توفير تفاصيل."

          body = f"""Bonjour,

Une mise à jour importante a été appliquée sur le site Yamani Food.

Titre :
{os.environ.get("COMMIT_MESSAGE", "").strip()}

Détails :
{update_message.strip()}

---
Projet : Yamani Food
Repository : {os.environ.get("REPOSITORY", "")}
Branche : main
Commit : {os.environ.get("COMMIT_SHA", "")[:7]}

---

مرحبًا،

تم تطبيق تحديث مهم على موقع Yamani Food.

عنوان التحديث:
{os.environ.get("COMMIT_MESSAGE", "").strip()}

التفاصيل:
{update_message.strip()}

---
المشروع: Yamani Food
الفرع: main
رقم التحديث: {os.environ.get("COMMIT_SHA", "")[:7]}
"""

          Path("email-body.txt").write_text(body, encoding="utf-8")
          PY

      - name: Send email
        if: steps.notify.outputs.send == 'true'
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Correction importante - Yamani Food
          to: aaalkhulagi@gmail.com,a774264429@gmail.com
          from: Yamani Food Updates <${{ secrets.EMAIL_USERNAME }}>
          body: file://email-body.txt
          priority: normal