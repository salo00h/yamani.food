name: Notify owners by email on push

on:
  push:
    branches:
      - main

jobs:
  send-email:
    if: contains(github.event.head_commit.message, '[notify]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read update message
        id: message
        run: |
          if [ -f update-message.txt ]; then
            {
              echo 'message<<YAMANI_MESSAGE_END'
              cat update-message.txt
              echo
              echo 'YAMANI_MESSAGE_END'
            } >> "$GITHUB_OUTPUT"
          else
            echo "message=Aucun message detaille fourni." >> "$GITHUB_OUTPUT"
          fi

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}

          subject: Correction importante - Yamani Food

          to: aaalkhulagi@gmail.com,a774264429@gmail.com

          from: Yamani Food Updates <${{ secrets.EMAIL_USERNAME }}>

          body: |
            Bonjour,

            Une correction importante a ete appliquee sur le site Yamani Food.

            Titre :
            ${{ github.event.head_commit.message }}

            Details :
            ${{ steps.message.outputs.message }}

            Projet : Yamani Food
            Branche : main
            Developpeur : salo00h

            Merci pour votre confiance.
