name: Notify owners by email on push

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  send-email:
    name: Notify owners by email
    runs-on: ubuntu-latest

    steps:
      - name: Check notify keyword
        id: check
        shell: bash
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          python3 <<'PY'
          import os

          found = "[notify]" in os.environ.get("COMMIT_MESSAGE", "")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"send_email={'true' if found else 'false'}\n")

          print("send_email =", found)
          PY

      - name: Skip email safely
        if: steps.check.outputs.send_email != 'true'
        run: echo "No [notify] found. Email skipped safely."

      - name: Checkout repository
        if: steps.check.outputs.send_email == 'true'
        uses: actions/checkout@v4

      - name: Build UTF-8 email body
        if: steps.check.outputs.send_email == 'true'
        shell: bash
        run: |
          {
            echo "🍽️ Yamani Food Update"
            echo ""
            echo "Bonjour 👋"
            echo ""
            echo "Une mise à jour importante a été appliquée sur le site Yamani Food."
            echo ""
            echo "📝 Détails :"
            echo ""

            if [ -f update-message.txt ]; then
              cat update-message.txt
            else
              echo "Aucun message fourni."
            fi

            echo ""
            echo "━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "مرحبًا 👋"
            echo ""
            echo "تم تطبيق تحديث مهم على موقع Yamani Food."
            echo ""
            echo "📝 التفاصيل:"
            echo ""

            if [ -f update-message.txt ]; then
              cat update-message.txt
            else
              echo "لم يتم توفير تفاصيل."
            fi

            echo ""
            echo "━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "📌 Commit:"
            echo "${{ github.event.head_commit.message }}"
            echo ""
            echo "🚀 Yamani Food"
          } > email-body.txt

      - name: Send email
        if: steps.check.outputs.send_email == 'true'
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}

          subject: 🍽️ Correction importante - Yamani Food

          to: aaalkhulagi@gmail.com,a774264429@gmail.com

          from: Saleh738297@gmail.com

          body: file://email-body.txt

          priority: normal